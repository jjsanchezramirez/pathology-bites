<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Lupus Anticoagulant (LAC) Interpreter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <div class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Advanced Lupus Anticoagulant Interpreter</h1>
      <p class="mt-2 text-md text-gray-500">Enter coagulation test results to generate a clinical interpretation.</p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-200">
      <form id="profileForm" class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
        <div>
          <label for="pt" class="block text-sm font-medium text-gray-600">PT (Prothrombin Time) <span class="text-gray-400 font-normal">(sec)</span></label>
          <input type="number" step="0.1" id="pt" name="pt" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-gray-50" placeholder="e.g., 12.5" required>
        </div>
        <div>
          <label for="inr" class="block text-sm font-medium text-gray-600">INR <span class="text-gray-400 font-normal">(ratio)</span></label>
          <input type="number" step="0.1" id="inr" name="inr" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-gray-50" placeholder="e.g., 1.1" required>
        </div>
        <div>
          <label for="ptt_la" class="block text-sm font-medium text-gray-600">aPTT (Lupus Sensitive) <span class="text-gray-400 font-normal">(sec)</span></label>
          <input type="number" step="0.1" id="ptt_la" name="ptt_la" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-gray-50" placeholder="e.g., 45.2" required>
        </div>
        <div>
          <label for="tt" class="block text-sm font-medium text-gray-600">TT (Thrombin Time) <span class="text-gray-400 font-normal">(sec)</span></label>
          <input type="number" step="0.1" id="tt" name="tt" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-gray-50" placeholder="e.g., 18.0" required>
        </div>
        <div>
          <label for="heparin_xa" class="block text-sm font-medium text-gray-600">Heparin Anti-Xa <span class="text-gray-400 font-normal">(IU/mL)</span></label>
          <input type="number" step="0.01" id="heparin_xa" name="heparin_xa" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-gray-50" placeholder="e.g., 0.00" required>
        </div>
        <div>
          <label for="drvvt" class="block text-sm font-medium text-gray-600">dRVVT Screen <span class="text-gray-400 font-normal">(sec)</span></label>
          <input type="number" step="0.1" id="drvvt" name="drvvt" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-gray-50" placeholder="e.g., 52.1" required>
        </div>
        <div>
          <label for="drvvt_ratio" class="block text-sm font-medium text-gray-600">dRVVT Confirm Ratio <span class="text-gray-400 font-normal">(ratio)</span></label>
          <input type="number" step="0.01" id="drvvt_ratio" name="drvvt_ratio" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-gray-50" placeholder="e.g., 1.52" required>
        </div>
        <div>
          <label for="hex_la_delta" class="block text-sm font-medium text-gray-600">Hexagonal Phase Delta <span class="text-gray-400 font-normal">(sec)</span></label>
          <input type="number" step="0.1" id="hex_la_delta" name="hex_la_delta" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-gray-50" placeholder="e.g., 10.5" required>
        </div>

        <div class="md:col-span-2 mt-4">
          <button type="submit" class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-md transition-transform transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Analyze Profile</button>
        </div>
      </form>
    </div>

    <div id="resultContainer" class="mt-8"></div>
  </div>

  <script>
    document.getElementById('profileForm').addEventListener('submit', function(event) {
      event.preventDefault();

      const values = {
        pt: parseFloat(document.getElementById('pt').value),
        inr: parseFloat(document.getElementById('inr').value),
        ptt_la: parseFloat(document.getElementById('ptt_la').value),
        tt: parseFloat(document.getElementById('tt').value),
        heparin_xa: parseFloat(document.getElementById('heparin_xa').value),
        drvvt: parseFloat(document.getElementById('drvvt').value),
        drvvt_ratio: parseFloat(document.getElementById('drvvt_ratio').value),
        hex_la_delta: parseFloat(document.getElementById('hex_la_delta').value),
      };

      const result = generateLupusAnticoagulantReport(values);
      displayResult(result);
    });

    function generateLupusAnticoagulantReport(values) {
      const ref = {
        pt: { low: 9.5, high: 13.5 },
        inr: { high: 1.2 },
        ptt_la: { high: 35 },
        tt: { high: 21 },
        heparin_xa: { critical: 1.5 },
        drvvt: { high: 45 },
        drvvt_ratio: { indeterminate: 1.1, positive: 1.2 },
        hex_la_delta: { positive: 8 }
      };

      let report = {
        overall: 'Negative',
        findings: {
          ptt: '',
          drvvt: '',
          other: []
        },
        caveats: []
      };

      let isLACPositive = false;
      let isLACIndeterminate = false;

      if (values.inr > 3.5) {
        report.caveats.push(`High INR (${values.inr.toFixed(2)}) significantly interferes with phospholipid-dependent clotting assays. Interpretation for LAC is unreliable. This may be due to warfarin or DOACs.`);
        report.overall = 'Uninterpretable';
        return report;
      }

      if (values.heparin_xa >= ref.heparin_xa.critical) {
        report.caveats.push(`High heparin anti-Xa level (${values.heparin_xa.toFixed(2)} IU/mL) significantly interferes with clotting assays. Interpretation for LAC is unreliable.`);
        report.overall = 'Uninterpretable';
        return report;
      }

      if (values.tt > 50) {
        report.caveats.push(`Markedly prolonged Thrombin Time (${values.tt.toFixed(1)}s) suggests presence of a direct thrombin inhibitor (e.g., Dabigatran) or high-dose heparin, making LAC assessment unreliable.`);
        report.overall = 'Uninterpretable';
        return report;
      }

      if (values.inr > ref.inr.high) {
        report.caveats.push(`INR is elevated (${values.inr.toFixed(2)}), which can be caused by anticoagulants (Warfarin, DOACs), liver disease, or factor deficiencies. This may influence results.`);
      }

      if (values.heparin_xa > 0.1) {
        report.caveats.push(`Heparin effect is present (Anti-Xa: ${values.heparin_xa.toFixed(2)} IU/mL). While assays are designed to mitigate this, a strong effect can still influence results.`);
      }

      if (values.tt > ref.tt.high && values.heparin_xa < 0.1) {
        report.caveats.push(`Thrombin Time is prolonged (${values.tt.toFixed(1)}s) in the absence of significant heparin, suggesting potential direct thrombin inhibitor, dysfibrinogenemia, or DIC.`);
      }

      if (values.ptt_la > ref.ptt_la.high) {
        if (values.hex_la_delta > ref.hex_la_delta.positive) {
          report.findings.ptt = 'aPTT is prolonged and demonstrates correction in the hexagonal phase assay. This finding is POSITIVE for a lupus anticoagulant.';
          isLACPositive = true;
        } else {
          report.findings.ptt = 'aPTT is prolonged but does not correct in the hexagonal phase assay. This is more suggestive of a factor deficiency (intrinsic pathway), a specific factor inhibitor, or an anticoagulant effect rather than a typical lupus anticoagulant.';
        }
      } else {
        report.findings.ptt = 'aPTT is within the normal range.';
      }

      if (values.drvvt > ref.drvvt.high) {
        if (values.drvvt_ratio > ref.drvvt_ratio.positive) {
          report.findings.drvvt = 'The dRVVT screen is prolonged with a positive confirm ratio. This finding is POSITIVE for a lupus anticoagulant.';
          isLACPositive = true;
        } else if (values.drvvt_ratio > ref.drvvt_ratio.indeterminate) {
          report.findings.drvvt = 'The dRVVT screen is prolonged with an indeterminate confirm ratio. This result is equivocal and may represent a weak lupus anticoagulant or interference from other factors.';
          isLACIndeterminate = true;
        } else {
          report.findings.drvvt = 'The dRVVT screen is prolonged but the confirm ratio is negative. This suggests a coagulation factor deficiency (common pathway) or a specific factor inhibitor rather than a lupus anticoagulant.';
        }
      } else {
        report.findings.drvvt = 'The dRVVT screen is within the normal range.';
      }

      if (values.pt > ref.pt.high) {
        report.findings.other.push('PT/INR is prolonged. When seen with a prolonged aPTT, this may indicate a common pathway factor deficiency (II, V, X), multiple factor deficiencies (e.g., liver disease, DIC), or certain anticoagulants.');
      }

      if (isLACPositive) {
        report.overall = 'Positive';
      } else if (isLACIndeterminate) {
        report.overall = 'Indeterminate';
      }

      if (report.overall === 'Negative' && report.caveats.length > 0) {
        report.overall = 'Indeterminate';
        report.caveats.push('The final result is indeterminate due to the presence of anticoagulants or other interfering factors, despite individual pathways being negative.');
      }

      return report;
    }

    function displayResult(report) {
      const container = document.getElementById('resultContainer');

      let overallClass = 'bg-green-100 text-green-800';
      let overallText = 'NEGATIVE for Lupus Anticoagulant';

      if (report.overall === 'Positive') {
        overallClass = 'bg-red-100 text-red-800';
        overallText = 'POSITIVE for Lupus Anticoagulant';
      } else if (report.overall === 'Indeterminate') {
        overallClass = 'bg-yellow-100 text-yellow-800';
        overallText = 'INDETERMINATE for Lupus Anticoagulant';
      } else if (report.overall === 'Uninterpretable') {
        overallClass = 'bg-gray-200 text-gray-800';
        overallText = 'UNINTERPRETABLE / REQUIRES REVIEW';
      }

      let caveatsHtml = '';
      if (report.caveats.length > 0) {
        caveatsHtml = `
          <div class="result-section border-t border-gray-200 pt-4">
            <h4 class="text-yellow-700 font-semibold">Important Caveats & Interferences</h4>
            <ul class="list-disc list-inside mt-2 space-y-1">
              ${report.caveats.map(c => `<li>${c}</li>`).join('')}
            </ul>
          </div>`;
      }

      let otherFindingsHtml = '';
      if (report.findings.other.length > 0) {
        otherFindingsHtml = `
          <div class="result-section">
            <h4 class="font-semibold text-gray-700">Other Findings</h4>
            <ul class="list-disc list-inside mt-2 space-y-1">
              ${report.findings.other.map(f => `<li>${f}</li>`).join('')}
            </ul>
          </div>`;
      }

      container.innerHTML = `
        <div class="result-card mt-6 p-5 bg-white border border-gray-200 rounded-lg shadow-md">
          <div class="p-4 rounded-lg ${overallClass}">
            <h3 class="text-xl font-bold text-center">${overallText}</h3>
          </div>

          <div class="mt-4 space-y-4">
            <div class="result-section">
              <h4 class="font-semibold text-gray-700">aPTT / Hexagonal Phase Pathway</h4>
              <p class="text-gray-600 text-sm">${report.findings.ptt}</p>
            </div>
            <div class="result-section">
              <h4 class="font-semibold text-gray-700">dRVVT Pathway</h4>
              <p class="text-gray-600 text-sm">${report.findings.drvvt}</p>
            </div>
            ${otherFindingsHtml}
            ${caveatsHtml}
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
